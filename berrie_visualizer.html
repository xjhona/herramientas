<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planificador de Cultivo de Arándanos</title>
    
    <!-- Librerías necesarias (React, Babel, Tailwind) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8fafc; }
        input[type=range] { -webkit-appearance: none; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; background: #7c3aed; cursor: pointer; margin-top: -6px; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: #e2e8f0; border-radius: 2px; }
    </style>
</head>
<body>
    <div id="root" class="h-screen flex flex-col"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- ICONOS SVG ---
        const Icon = ({ children, className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {children}
            </svg>
        );

        const SettingsIcon = () => <Icon><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.09a2 2 0 0 1-1-1.74v-.47a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.39a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></Icon>;
        const SproutIcon = () => <Icon><path d="M7 20h10"/><path d="M10 20c5.5-2.5.8-6.4 3-10"/><path d="M9.5 9.4c1.1.8 1.8 2.2 2.3 3.7-2 .4-3.2.4-4.8-.4-1.2-.6-2.1-2.2-2.1-2.2 0 0 1.8-1.3 4.6-1.1Z"/></Icon>;
        const LeafIcon = () => <Icon><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 6.5-2 12A7 7 0 0 1 11 20Z"/><path d="M8 21h4"/><path d="M7 2a11.9 11.9 0 0 0-2 19"/></Icon>;
        const MaximizeIcon = () => <Icon><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></Icon>;
        const LayoutIcon = () => <Icon><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><line x1="3" x2="21" y1="9" y2="9"/><line x1="9" x2="9" y1="21" y2="9"/></Icon>;
        const WindIcon = () => <Icon><path d="M17.7 7.7a2.5 2.5 0 1 1 1.8 4.3H2"/><path d="M9.6 4.6A2 2 0 1 1 11 8H2"/><path d="M12.6 19.4A2 2 0 1 0 14 16H2"/></Icon>;
        const ZoomInIcon = () => <Icon><circle cx="11" cy="11" r="8"/><line x1="21" x2="16.65" y1="21" y2="16.65"/><line x1="11" x2="11" y1="8" y2="14"/><line x1="8" x2="14" y1="11" y2="11"/></Icon>;
        const ZoomOutIcon = () => <Icon><circle cx="11" cy="11" r="8"/><line x1="21" x2="16.65" y1="21" y2="16.65"/><line x1="8" x2="14" y1="11" y2="11"/></Icon>;

        // --- COMPONENTE PRINCIPAL ---
        const BlueberryPlanner = () => {
            const [params, setParams] = useState({
                distPlantas: 0.75,
                distHileras: 2.20,
                distCortina: 1.10,
                anchoCalle: 4.00,
                largoLote: 100,
                anchoLote: 100,
                areaTotal: 1,
                hilerasIniciales: 4, 
                hilerasPorBloque: 8,
                frecuenciaCortinas: 4 
            });

            const [zoom, setZoom] = useState(35);
            // ESTADO PARA EL MODO DE VISTA: 'isometric', 'top', 'profile'
            const [viewMode, setViewMode] = useState('isometric'); 
            
            const canvasRef = useRef(null);
            const containerRef = useRef(null);

            // Cálculos Agronómicos
            const stats = useMemo(() => {
                const hilerasBloque = Math.max(1, params.hilerasPorBloque);
                const dHileras = Math.max(0.1, params.distHileras);
                const dPlantas = Math.max(0.1, params.distPlantas);

                const espaciosEntreHileras = hilerasBloque - 1;
                const anchoTotalBloque = (dHileras * espaciosEntreHileras) + params.anchoCalle;
                const distPromedioHileras = anchoTotalBloque / hilerasBloque;
                
                const areaPorPlanta = distPromedioHileras * dPlantas;
                const plantasPorHa = areaPorPlanta > 0 ? Math.floor(10000 / areaPorPlanta) : 0;
                const totalPlantas = Math.floor(plantasPorHa * params.areaTotal);
                
                return {
                    plantasPorHa,
                    totalPlantas,
                    distPromedioHileras: distPromedioHileras.toFixed(2)
                };
            }, [params]);

            const handleChange = (e) => {
                const { name, value } = e.target;
                setParams(prev => ({ ...prev, [name]: value === '' ? 0 : parseFloat(value) }));
            };

            const handleZoom = (delta) => {
                setZoom(prev => Math.min(Math.max(prev + delta, 15), 100));
            };

            const draw = () => {
                const canvas = canvasRef.current;
                const container = containerRef.current;
                if (!canvas || !container) return;

                const ctx = canvas.getContext('2d');
                const dpr = window.devicePixelRatio || 1;
                const rect = container.getBoundingClientRect();
                
                canvas.width = rect.width * dpr;
                canvas.height = rect.height * dpr;
                ctx.scale(dpr, dpr);
                canvas.style.width = `${rect.width}px`;
                canvas.style.height = `${rect.height}px`;

                const width = rect.width;
                const height = rect.height;

                // Limpiar
                ctx.clearRect(0, 0, width, height);
                
                // Fondo dependiendo de la vista
                if (viewMode === 'profile') {
                    // Cielo y Tierra para Perfil
                    ctx.fillStyle = '#f0f8ff'; 
                    ctx.fillRect(0, 0, width, height * 0.75); // Cielo
                    ctx.fillStyle = '#e6d5c3'; 
                    ctx.fillRect(0, height * 0.75, width, height * 0.25); // Tierra subsuelo
                    ctx.strokeStyle = '#8D6E63'; ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.moveTo(0, height * 0.75); ctx.lineTo(width, height * 0.75); ctx.stroke(); // Línea de suelo
                } else {
                    // Gradiente suave para Isométrica y Planta
                    const gradient = ctx.createLinearGradient(0, 0, 0, height);
                    gradient.addColorStop(0, '#f8fafc'); 
                    gradient.addColorStop(1, '#ffffff');
                    ctx.fillStyle = gradient;
                    ctx.fillRect(0, 0, width, height);
                }

                if (params.distPlantas < 0.1 || params.distHileras < 0.1) {
                    ctx.fillStyle = "#94a3b8";
                    ctx.font = "14px sans-serif";
                    ctx.fillText("Ingrese valores válidos...", 20, 30);
                    return; 
                }

                // Configuración de visualización
                const viewWidthMeters = 30 * (35/zoom); 
                const viewDepthMeters = 24 * (35/zoom);
                const scale = zoom;

                // Centro de la pantalla según la vista
                const centerX = width / 2;
                const centerY = viewMode === 'top' ? height / 2 : height / 5;
                
                // Motor de Proyección
                const getCoords = (x, y) => {
                    if (viewMode === 'isometric') {
                        const isoX = (x - y) * Math.cos(Math.PI / 6);
                        const isoY = (x + y) * Math.sin(Math.PI / 6);
                        return { x: centerX + isoX * scale, y: centerY + isoY * scale };
                    } else if (viewMode === 'top') {
                        // Centrar el plano 2D
                        const offsetX = centerX - (viewWidthMeters * scale)/3;
                        const offsetY = centerY - (viewDepthMeters * scale)/2;
                        return { x: offsetX + x * scale, y: offsetY + y * scale };
                    } else if (viewMode === 'profile') {
                        // Vista lateral transversal (Corte X)
                        const offsetX = centerX - (viewWidthMeters * scale)/3;
                        return { x: offsetX + x * scale, y: height * 0.75 }; // Suelo fijo
                    }
                };

                const drawElement = (x, y, type) => {
                    const coords = getCoords(x, y);
                    const screenX = coords.x;
                    const screenY = coords.y;
                    
                    if (screenX < -100 || screenX > width + 100 || screenY < -100 || screenY > height + 100) return;

                    ctx.save();
                    ctx.translate(screenX, screenY);
                    const elementScale = Math.max(0.6, scale / 35); 
                    ctx.scale(elementScale, elementScale);

                    if (viewMode === 'isometric') {
                        if (type === 'pot') {
                            ctx.fillStyle = 'rgba(0,0,0,0.15)'; ctx.beginPath(); ctx.ellipse(0, 4, 8, 4, 0, 0, 2 * Math.PI); ctx.fill();
                            ctx.fillStyle = '#5D4037'; ctx.beginPath(); ctx.moveTo(-6, 0); ctx.lineTo(6, 0); ctx.lineTo(4.5, 9); ctx.lineTo(-4.5, 9); ctx.closePath(); ctx.fill();
                            ctx.fillStyle = '#3E2723'; ctx.beginPath(); ctx.ellipse(0, 0, 6, 2.5, 0, 0, 2 * Math.PI); ctx.fill();
                            ctx.fillStyle = '#1B5E20'; ctx.beginPath(); ctx.arc(-3, -6, 6, 0, 2 * Math.PI); ctx.fill();
                            ctx.beginPath(); ctx.arc(3, -6, 6, 0, 2 * Math.PI); ctx.fill(); ctx.beginPath(); ctx.arc(0, -9, 7, 0, 2 * Math.PI); ctx.fill();
                            ctx.fillStyle = '#2E7D32'; ctx.beginPath(); ctx.arc(-2, -8, 5, 0, 2 * Math.PI); ctx.fill();
                            ctx.beginPath(); ctx.arc(2, -8, 5, 0, 2 * Math.PI); ctx.fill(); ctx.beginPath(); ctx.arc(0, -11, 5, 0, 2 * Math.PI); ctx.fill();
                            ctx.fillStyle = '#3F51B5'; 
                            const berries = [{x:-2, y:-6}, {x:2, y:-10}, {x:4, y:-5}, {x:-3, y:-11}, {x:0, y:-7}];
                            berries.forEach(b => { ctx.beginPath(); ctx.arc(b.x, b.y, 1.8, 0, 2 * Math.PI); ctx.fill(); ctx.fillStyle = '#9FA8DA'; ctx.beginPath(); ctx.arc(b.x - 0.5, b.y - 0.5, 0.5, 0, 2 * Math.PI); ctx.fill(); ctx.fillStyle = '#3F51B5'; });
                        } else if (type === 'mesh') {
                            const postHeight = 45;
                            ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.beginPath(); ctx.ellipse(2, 0, 4, 2, 0, 0, 2 * Math.PI); ctx.fill();
                            ctx.fillStyle = '#607D8B'; ctx.fillRect(-2, -postHeight, 4, postHeight);
                            const nextPostY = 25; const nextPostX = -14; 
                            ctx.fillStyle = 'rgba(30, 30, 30, 0.6)'; ctx.beginPath(); ctx.moveTo(0, -postHeight); ctx.lineTo(0, 0); ctx.lineTo(nextPostX, nextPostY); ctx.lineTo(nextPostX, nextPostY - postHeight); ctx.closePath(); ctx.fill();
                            ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 1; ctx.beginPath();
                            ctx.moveTo(0, -postHeight); ctx.lineTo(nextPostX, nextPostY - 20); ctx.moveTo(0, -postHeight + 15); ctx.lineTo(nextPostX, nextPostY - 5); ctx.moveTo(0, -postHeight + 30); ctx.lineTo(nextPostX, nextPostY + 10); ctx.moveTo(nextPostX, nextPostY - postHeight); ctx.lineTo(0, -20); ctx.moveTo(nextPostX, nextPostY - postHeight + 15); ctx.lineTo(0, -5); ctx.stroke();
                        }
                    } else if (viewMode === 'top') {
                        if (type === 'pot') {
                            ctx.fillStyle = '#4E342E'; ctx.beginPath(); ctx.arc(0, 0, 7, 0, 2 * Math.PI); ctx.fill();
                            ctx.fillStyle = '#2E7D32'; ctx.beginPath(); ctx.arc(0, 0, 10, 0, 2 * Math.PI); ctx.fill();
                            ctx.fillStyle = '#3F51B5'; ctx.beginPath(); ctx.arc(-3, -3, 2, 0, 2*Math.PI); ctx.fill(); ctx.beginPath(); ctx.arc(4, 3, 2, 0, 2*Math.PI); ctx.fill();
                        } else if (type === 'mesh') {
                            ctx.fillStyle = '#607D8B'; ctx.fillRect(-3, -3, 6, 6); // Poste desde arriba
                            ctx.fillStyle = 'rgba(50, 50, 50, 0.5)'; ctx.fillRect(-1, 0, 2, 2 * scale / elementScale); // Red proyectada
                        }
                    } else if (viewMode === 'profile') {
                        if (type === 'pot') {
                            // Maceta lateral
                            ctx.fillStyle = '#3E2723'; ctx.fillRect(-7, -11, 14, 2); // Borde
                            ctx.fillStyle = '#5D4037'; ctx.beginPath(); ctx.moveTo(-6, -9); ctx.lineTo(6, -9); ctx.lineTo(4.5, 0); ctx.lineTo(-4.5, 0); ctx.fill(); // Cuerpo
                            // Arbusto lateral
                            ctx.fillStyle = '#1B5E20'; ctx.beginPath(); ctx.arc(0, -18, 10, 0, 2*Math.PI); ctx.fill();
                            ctx.fillStyle = '#2E7D32'; ctx.beginPath(); ctx.arc(0, -22, 8, 0, 2*Math.PI); ctx.fill();
                        } else if (type === 'mesh') {
                            // Poste lateral alto
                            ctx.fillStyle = '#455A64'; ctx.fillRect(-2, -55, 4, 55);
                            ctx.strokeStyle = 'rgba(0,0,0,0.5)'; ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,-55); ctx.stroke();
                        }
                    }
                    ctx.restore();
                };

                // Lógica de bucles para Perfil: Solo necesitamos UNA capa en Y para no redibujar 20 plantas en la misma coordenada
                const yStepMesh = viewMode === 'profile' ? viewDepthMeters + 1 : 2;
                const yStepPlant = viewMode === 'profile' ? viewDepthMeters + 1 : params.distPlantas;

                // 1. Dibujar Cortina Perimetral
                for (let y = 0; y < viewDepthMeters; y += yStepMesh) {
                    drawElement(-params.distCortina, y, 'mesh');
                }

                // Etiqueta perimetral
                const labelPerim = getCoords(-params.distCortina, viewMode === 'top' ? 0 : viewDepthMeters/4);
                ctx.fillStyle = '#333'; ctx.font = `bold ${Math.max(10, 11 * (scale/35))}px sans-serif`;
                if (viewMode === 'isometric') ctx.fillText("Malla Perimetral", labelPerim.x - 40, labelPerim.y - 60);
                if (viewMode === 'top') ctx.fillText("Malla Perim.", labelPerim.x - 40, labelPerim.y - 15);
                if (viewMode === 'profile') ctx.fillText("Malla Perim.", labelPerim.x - 35, labelPerim.y - 80);

                // 2. Dibujar Plantas, Calles y Cortinas Internas
                let currentX = 0;
                let rowsSinceLastStreet = 0;
                let isFirstBlock = true; 

                while (currentX < viewWidthMeters) {
                    
                    for (let y = 0; y < viewDepthMeters; y += yStepPlant) {
                        drawElement(currentX, y, 'pot');
                    }

                    let stepToNextRow = params.distHileras;
                    rowsSinceLastStreet++; 

                    let targetRows = isFirstBlock ? params.hilerasIniciales : params.hilerasPorBloque;

                    const isStreet = (rowsSinceLastStreet === targetRows);
                    const isWindbreak = !isStreet && (params.frecuenciaCortinas > 0 && rowsSinceLastStreet % params.frecuenciaCortinas === 0);

                    if (isStreet) {
                        stepToNextRow = params.anchoCalle; 
                        const streetWidthVisual = stepToNextRow - 1; 
                        const streetCenterX = currentX + stepToNextRow/2;
                        
                        const s_p1 = getCoords(streetCenterX - streetWidthVisual/2, 0);
                        const s_p2 = getCoords(streetCenterX + streetWidthVisual/2, 0);
                        const s_p3 = getCoords(streetCenterX + streetWidthVisual/2, viewDepthMeters);
                        const s_p4 = getCoords(streetCenterX - streetWidthVisual/2, viewDepthMeters);

                        if (viewMode === 'profile') {
                            ctx.fillStyle = 'rgba(210, 180, 140, 0.8)';
                            ctx.fillRect(s_p1.x, s_p1.y, s_p2.x - s_p1.x, 8); // Grosor de calle
                            
                            if (currentX < viewWidthMeters) {
                                ctx.fillStyle = '#8D6E63'; ctx.textAlign = 'center'; ctx.font = `italic ${Math.max(9, 11 * (scale/35))}px sans-serif`;
                                ctx.fillText(`Calle Principal`, s_p1.x + (s_p2.x - s_p1.x)/2, s_p1.y + 20);
                                ctx.fillText(`(${params.anchoCalle}m)`, s_p1.x + (s_p2.x - s_p1.x)/2, s_p1.y + 32);
                                ctx.textAlign = 'left';
                            }
                        } else {
                            ctx.beginPath(); ctx.moveTo(s_p1.x, s_p1.y); ctx.lineTo(s_p2.x, s_p2.y); ctx.lineTo(s_p3.x, s_p3.y); ctx.lineTo(s_p4.x, s_p4.y); ctx.closePath();
                            ctx.fillStyle = 'rgba(210, 180, 140, 0.3)'; ctx.fill();
                            ctx.strokeStyle = 'rgba(210, 180, 140, 0.8)'; ctx.stroke();

                            if (currentX < viewWidthMeters) {
                                const sCenter = getCoords(streetCenterX, viewDepthMeters/2);
                                ctx.fillStyle = '#8D6E63'; ctx.font = `italic ${Math.max(9, 11 * (scale/35))}px sans-serif`;
                                ctx.fillText(`Calle Principal`, sCenter.x - 30, sCenter.y);
                                ctx.fillText(`(${params.anchoCalle}m)`, sCenter.x - 15, sCenter.y + 12);
                            }
                        }
                        
                        rowsSinceLastStreet = 0;
                        isFirstBlock = false;

                    } else if (isWindbreak) {
                        const cortinaX = currentX + stepToNextRow/2;
                        for (let y = 0; y < viewDepthMeters; y += yStepMesh) {
                            drawElement(cortinaX, y, 'mesh');
                        }
                        
                        if (cortinaX < viewWidthMeters) {
                            const cCoords = getCoords(cortinaX, viewMode === 'top' ? 0 : viewDepthMeters/2);
                            ctx.fillStyle = '#1B5E20'; ctx.font = `bold ${Math.max(9, 11 * (scale/35))}px sans-serif`;
                            if (viewMode === 'profile') ctx.fillText(`Cortina`, cCoords.x - 20, cCoords.y - 80);
                            else ctx.fillText(`Cortina Central`, cCoords.x - 15, cCoords.y - (viewMode==='top'?15:20));
                        }
                    }
                    currentX += stepToNextRow;
                }

                // --- COTAS (Métricas) ---
                const fontSize = Math.max(9, 11 * (scale/35));
                ctx.font = `bold ${fontSize}px sans-serif`;

                // Cota Plantas (Oculta en vista perfil porque no hay profundidad)
                if (viewMode !== 'profile') {
                    const pStart = getCoords(0, 0);
                    const pEnd = getCoords(0, params.distPlantas);
                    ctx.strokeStyle = '#E91E63'; ctx.lineWidth = 2; ctx.beginPath();
                    if (viewMode === 'top') {
                        ctx.moveTo(pStart.x - 20, pStart.y); ctx.lineTo(pEnd.x - 20, pEnd.y); ctx.stroke();
                        ctx.fillStyle = '#E91E63'; ctx.fillText(`${params.distPlantas}m`, pEnd.x - 50, pStart.y + (pEnd.y-pStart.y)/2 + 4);
                    } else {
                        ctx.moveTo(pStart.x + 20, pStart.y); ctx.lineTo(pEnd.x + 20, pEnd.y); ctx.stroke();
                        ctx.fillStyle = '#E91E63'; ctx.fillText(`${params.distPlantas}m`, pEnd.x + 25, pEnd.y - 5);
                    }
                }

                // Cota Hileras
                const hStart = getCoords(0, 0);
                const hEnd = getCoords(params.distHileras, 0);
                ctx.strokeStyle = '#2196F3'; ctx.lineWidth = 2; ctx.beginPath();
                
                if (viewMode === 'profile') {
                    ctx.moveTo(hStart.x, hStart.y + 45); ctx.lineTo(hEnd.x, hEnd.y + 45); ctx.stroke(); 
                    ctx.fillStyle = '#2196F3'; ctx.textAlign = 'center';
                    ctx.fillText(`${params.distHileras}m`, hStart.x + (hEnd.x - hStart.x)/2, hStart.y + 60); ctx.textAlign = 'left';
                } else if (viewMode === 'top') {
                    ctx.moveTo(hStart.x, hStart.y - 20); ctx.lineTo(hEnd.x, hEnd.y - 20); ctx.stroke(); 
                    ctx.fillStyle = '#2196F3'; ctx.textAlign = 'center';
                    ctx.fillText(`${params.distHileras}m`, hStart.x + (hEnd.x - hStart.x)/2, hStart.y - 25); ctx.textAlign = 'left';
                } else {
                    ctx.moveTo(hStart.x, hStart.y + 15); ctx.lineTo(hEnd.x, hEnd.y + 15); ctx.stroke();
                    ctx.fillStyle = '#2196F3'; ctx.fillText(`${params.distHileras}m`, hStart.x + (hEnd.x - hStart.x)/2 - 10, hStart.y + 30);
                }
            };

            useEffect(() => {
                const timeoutId = setTimeout(() => draw(), 50);
                return () => clearTimeout(timeoutId);
            }, [params, zoom, viewMode]); // Añadido viewMode como dependencia

            useEffect(() => {
                const handleResize = () => window.requestAnimationFrame(draw);
                window.addEventListener('resize', handleResize);
                handleResize();
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            return (
                <div className="flex flex-col h-full bg-slate-50 text-slate-800">
                    {/* Header Resumen */}
                    <div className="bg-white p-4 shadow-sm border-b border-slate-200 grid grid-cols-1 md:grid-cols-3 gap-4 flex-shrink-0">
                        <div className="flex items-center space-x-3 p-3 bg-purple-50 rounded-lg border border-purple-100">
                            <div className="bg-purple-600 text-white p-2 rounded-full"><SproutIcon /></div>
                            <div>
                                <p className="text-xs text-purple-800 font-semibold uppercase">Total Plantas</p>
                                <p className="text-xl md:text-2xl font-bold text-purple-900">{stats.totalPlantas.toLocaleString()}</p>
                            </div>
                        </div>
                        <div className="flex items-center space-x-3 p-3 bg-green-50 rounded-lg border border-green-100">
                            <div className="bg-green-600 text-white p-2 rounded-full"><LeafIcon /></div>
                            <div>
                                <p className="text-xs text-green-800 font-semibold uppercase">Densidad (Pl/Ha)</p>
                                <p className="text-xl md:text-2xl font-bold text-green-900">{stats.plantasPorHa.toLocaleString()}</p>
                            </div>
                        </div>
                        <div className="flex items-center p-3 bg-blue-50 rounded-lg border border-blue-100">
                            <div className="flex items-center space-x-3">
                                <div className="bg-blue-600 text-white p-2 rounded-full"><MaximizeIcon /></div>
                                <div>
                                    <p className="text-xs text-blue-800 font-semibold uppercase">Ancho Promedio</p>
                                    <p className="text-xl md:text-2xl font-bold text-blue-900">{stats.distPromedioHileras}m</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="flex flex-col lg:flex-row flex-1 overflow-hidden">
                        {/* Panel de Control */}
                        <div className="w-full lg:w-80 bg-white shadow-md z-10 overflow-y-auto border-r border-slate-200 flex-shrink-0">
                            <div className="p-4 bg-purple-900 text-white flex items-center gap-2 sticky top-0 z-10">
                                <SettingsIcon />
                                <h2 className="font-bold">Parámetros</h2>
                            </div>
                            <div className="p-6 space-y-6">
                                {/* Grupo 1 */}
                                <div className="space-y-4">
                                    <h3 className="text-sm font-bold text-slate-400 uppercase tracking-wider border-b pb-1">Marco de Plantación</h3>
                                    <div className="space-y-2">
                                        <label className="text-sm font-medium text-slate-700 flex justify-between">Entre Plantas (m)</label>
                                        <div className="flex gap-2">
                                            <input type="number" name="distPlantas" min="0.10" max="3.00" step="0.01" value={params.distPlantas === 0 ? '' : params.distPlantas} onChange={handleChange} className="w-20 p-1 border border-slate-300 rounded text-center font-bold text-purple-700 focus:ring-2 focus:ring-purple-500 outline-none" />
                                            <input type="range" name="distPlantas" min="0.2" max="2.0" step="0.01" value={params.distPlantas || 0.75} onChange={handleChange} className="flex-1 h-8 bg-slate-200 rounded-lg accent-purple-600 align-middle" />
                                        </div>
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-sm font-medium text-slate-700 flex justify-between">Entre Hileras (m)</label>
                                        <div className="flex gap-2">
                                            <input type="number" name="distHileras" min="0.50" max="5.00" step="0.01" value={params.distHileras === 0 ? '' : params.distHileras} onChange={handleChange} className="w-20 p-1 border border-slate-300 rounded text-center font-bold text-purple-700 focus:ring-2 focus:ring-purple-500 outline-none" />
                                            <input type="range" name="distHileras" min="1.0" max="4.0" step="0.01" value={params.distHileras || 2.20} onChange={handleChange} className="flex-1 h-8 bg-slate-200 rounded-lg accent-purple-600" />
                                        </div>
                                    </div>
                                </div>
                                {/* Grupo 2 */}
                                <div className="space-y-4">
                                    <h3 className="text-sm font-bold text-slate-400 uppercase tracking-wider border-b pb-1">Estructura del Lote</h3>
                                    
                                    <div className="grid grid-cols-2 gap-3 mb-2">
                                        <div className="space-y-1">
                                            <label className="text-xs font-medium text-slate-600">Cortina Perim. (m)</label>
                                            <div className="flex items-center border rounded px-2 bg-slate-50">
                                                <WindIcon className="text-slate-400 mr-2" />
                                                <input type="number" name="distCortina" step="0.01" value={params.distCortina === 0 ? '' : params.distCortina} onChange={handleChange} className="w-full py-1 bg-transparent outline-none text-sm" />
                                            </div>
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-xs font-medium text-slate-600">Ancho Calle (m)</label>
                                            <div className="flex items-center border rounded px-2 bg-slate-50">
                                                <LayoutIcon className="text-slate-400 mr-2" />
                                                <input type="number" name="anchoCalle" step="0.01" value={params.anchoCalle === 0 ? '' : params.anchoCalle} onChange={handleChange} className="w-full py-1 bg-transparent outline-none text-sm" />
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div className="space-y-4 pt-2 border-t border-slate-100">
                                        <div>
                                            <label className="text-sm font-medium text-slate-700">Hileras Iniciales (Borde)</label>
                                            <div className="flex items-center justify-between text-xs text-slate-500 mb-1">
                                                <span>Primer bloque inicia con {params.hilerasIniciales} hileras</span>
                                            </div>
                                            <input type="range" name="hilerasIniciales" min="1" max="20" step="1" value={params.hilerasIniciales} onChange={handleChange} className="w-full h-2 bg-slate-200 rounded-lg cursor-pointer accent-blue-500" />
                                        </div>

                                        <div>
                                            <label className="text-sm font-medium text-slate-700">Hileras por Bloque Regular</label>
                                            <div className="flex items-center justify-between text-xs text-slate-500 mb-1">
                                                <span>Calles cada {params.hilerasPorBloque} hileras</span>
                                            </div>
                                            <input type="range" name="hilerasPorBloque" min="2" max="20" step="1" value={params.hilerasPorBloque} onChange={handleChange} className="w-full h-2 bg-slate-200 rounded-lg cursor-pointer accent-orange-500" />
                                        </div>

                                        <div>
                                            <label className="text-sm font-medium text-slate-700">Frecuencia Cortina Interna</label>
                                            <div className="flex items-center justify-between text-xs text-slate-500 mb-1">
                                                <span>{params.frecuenciaCortinas === 0 ? "Solo perimetral" : `Cortina cada ${params.frecuenciaCortinas} hileras`}</span>
                                            </div>
                                            <input type="range" name="frecuenciaCortinas" min="0" max="20" step="1" value={params.frecuenciaCortinas} onChange={handleChange} className="w-full h-2 bg-slate-200 rounded-lg cursor-pointer accent-green-600" />
                                        </div>
                                    </div>
                                </div>
                                {/* Grupo 3 */}
                                <div className="space-y-4">
                                    <h3 className="text-sm font-bold text-slate-400 uppercase tracking-wider border-b pb-1">Proyecto</h3>
                                    <div className="space-y-1">
                                        <label className="text-sm font-medium text-slate-700">Área Total (Hectáreas)</label>
                                        <input type="number" name="areaTotal" step="0.01" value={params.areaTotal} onChange={handleChange} className="w-full p-2 border border-slate-300 rounded focus:ring-2 focus:ring-purple-500 outline-none" />
                                    </div>
                                </div>
                                <div className="bg-blue-50 p-3 rounded text-xs text-blue-800 border border-blue-200">
                                    <p><strong>Cálculo:</strong> Se usa el distanciamiento promedio: <em>(({params.distHileras || 0} * {params.hilerasPorBloque - 1}) + {params.anchoCalle || 0}) / {params.hilerasPorBloque} = {stats.distPromedioHileras}m</em></p>
                                </div>
                                {/* Footer Credits */}
                                <div className="mt-4 text-center">
                                    <span className="text-[10px] text-slate-400 font-mono">Vibe-coded by jchilet</span>
                                </div>
                            </div>
                        </div>

                        {/* Visualización */}
                        <div ref={containerRef} className="flex-1 bg-slate-100 relative overflow-hidden flex items-center justify-center p-0">
                            
                            {/* NUEVO: Controles de Vista */}
                            <div className="absolute top-4 left-1/2 -translate-x-1/2 z-20 flex bg-white/90 backdrop-blur rounded-lg shadow-md p-1 border border-slate-200">
                                <button 
                                    onClick={() => setViewMode('isometric')} 
                                    className={`px-4 py-1.5 text-xs font-bold rounded-md transition-colors ${viewMode === 'isometric' ? 'bg-purple-100 text-purple-700' : 'text-slate-500 hover:bg-slate-50'}`}
                                >
                                    Isométrica
                                </button>
                                <button 
                                    onClick={() => setViewMode('top')} 
                                    className={`px-4 py-1.5 text-xs font-bold rounded-md transition-colors ${viewMode === 'top' ? 'bg-purple-100 text-purple-700' : 'text-slate-500 hover:bg-slate-50'}`}
                                >
                                    Planta
                                </button>
                                <button 
                                    onClick={() => setViewMode('profile')} 
                                    className={`px-4 py-1.5 text-xs font-bold rounded-md transition-colors ${viewMode === 'profile' ? 'bg-purple-100 text-purple-700' : 'text-slate-500 hover:bg-slate-50'}`}
                                >
                                    Perfil
                                </button>
                            </div>

                            <div className="absolute top-4 right-4 z-20 flex flex-col gap-2">
                                <button onClick={() => handleZoom(5)} className="bg-white p-2 rounded-lg shadow-md hover:bg-slate-50 border border-slate-200 text-slate-600 transition-colors" title="Acercar">
                                    <ZoomInIcon />
                                </button>
                                <button onClick={() => handleZoom(-5)} className="bg-white p-2 rounded-lg shadow-md hover:bg-slate-50 border border-slate-200 text-slate-600 transition-colors" title="Alejar">
                                    <ZoomOutIcon />
                                </button>
                            </div>
                            
                            <canvas ref={canvasRef} className="block shadow-md bg-white cursor-move" style={{ maxWidth: '100%', maxHeight: '100%' }} />

                            <div className="absolute bottom-6 right-6 bg-white/90 backdrop-blur p-3 rounded-lg shadow-lg border border-slate-200 text-xs space-y-2 pointer-events-none z-10">
                                <div className="flex items-center gap-2"><div className="w-3 h-3 rounded-full bg-[#1B5E20]"></div><span>Arándano en Maceta</span></div>
                                <div className="flex items-center gap-2"><div className="w-3 h-3 bg-[#607D8B] border border-black"></div><span>Malla Cortaviento</span></div>
                                <div className="flex items-center gap-2"><div className="w-3 h-3 bg-[rgba(210,180,140,0.8)] border border-yellow-600"></div><span>Calle</span></div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<BlueberryPlanner />);
    </script>
</body>
</html>
